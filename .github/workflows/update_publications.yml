name: Update Academic and Talks Data

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-academic-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch publications, profile, talks, Scholar metrics, Medium articles
        run: |
          python scripts/fetch_publications.py
          python scripts/sync_arxiv_publications.py
          python scripts/fetch_orcid_profile.py
          python scripts/fetch_talks.py
          python scripts/fetch_scholar_metrics.py
          python scripts/fetch_medium_articles.py

      - name: Fetch per-paper citation metrics (OpenAlex)
        run: python scripts/fetch_paper_metrics.py

      - name: Fetch project engagement metrics (GitHub + Zenodo)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_project_metrics.py

      - name: Generate activity feed from all sources
        run: python scripts/generate_activity.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- publications.json orcid_profile.json talks.json scholar_metrics.json medium_articles.json paper_metrics.json project_metrics.json activity.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push data files
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publications.json orcid_profile.json talks.json scholar_metrics.json medium_articles.json paper_metrics.json project_metrics.json activity.json
          git commit -m "chore: update academic data, metrics, and activity feed"
          git push
